services:
  postgres:
    image: postgres:15-alpine
    container_name: vimoo-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - vimoo-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hlo -d vimoo" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache Redis
  redis:
    image: redis:7-alpine
    ports:
     - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vimoo-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes


  vimoo-app-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: vimoo-app-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
    volumes:
        - app_logs:/app/logs
    networks:
        - vimoo-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped


volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local


networks:
  vimoo-network:
    driver: bridge